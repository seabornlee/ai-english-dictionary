name: Error Insight Scanner

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  scan-errors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for error patterns
        id: scan
        run: |
          echo "## Server Error Patterns" > /tmp/error-report.md
          echo "" >> /tmp/error-report.md

          # Check for catch blocks without proper error handling
          EMPTY_CATCH=$(rg -c "catch\s*\([^)]*\)\s*\{\s*\}" server/src/ 2>/dev/null | awk -F: '{sum+=$2} END {print sum+0}')
          if [ "$EMPTY_CATCH" -gt 0 ]; then
            echo "- ⚠️ Found $EMPTY_CATCH empty catch blocks in server/src/" >> /tmp/error-report.md
          fi

          # Check for console.error that should use structured logging
          CONSOLE_ERROR=$(rg -c "console\.error" server/src/ 2>/dev/null | awk -F: '{sum+=$2} END {print sum+0}')
          if [ "$CONSOLE_ERROR" -gt 0 ]; then
            echo "- ℹ️ Found $CONSOLE_ERROR console.error calls (consider using Pino logger)" >> /tmp/error-report.md
          fi

          # Check for unhandled promise rejections
          NO_AWAIT=$(rg -c "async\s+function" server/src/ 2>/dev/null | awk -F: '{sum+=$2} END {print sum+0}')
          echo "- ℹ️ Found $NO_AWAIT async functions in server/src/" >> /tmp/error-report.md

          # Check for hardcoded error messages
          HARDCODED=$(rg -c "status\(5[0-9][0-9]\)\.json\(\{.*error:" server/src/ 2>/dev/null | awk -F: '{sum+=$2} END {print sum+0}')
          if [ "$HARDCODED" -gt 0 ]; then
            echo "- ⚠️ Found $HARDCODED hardcoded error responses" >> /tmp/error-report.md
          fi

          # Swift error patterns
          FORCE_TRY=$(rg -c "try!" mac-app/AIDictionary/ 2>/dev/null | awk -F: '{sum+=$2} END {print sum+0}')
          if [ "$FORCE_TRY" -gt 0 ]; then
            echo "- 🔴 Found $FORCE_TRY force-try (!) in Swift code" >> /tmp/error-report.md
          fi

          FORCE_UNWRAP=$(rg -c "!" mac-app/AIDictionary/ 2>/dev/null | rg -c "as!" 2>/dev/null | awk -F: '{sum+=$2} END {print sum+0}')
          echo "- ℹ️ Found potential force unwraps in Swift code" >> /tmp/error-report.md

          cat /tmp/error-report.md

          # Check if there are actionable findings
          if grep -q "🔴\|⚠️" /tmp/error-report.md; then
            echo "has_findings=true" >> $GITHUB_OUTPUT
          else
            echo "has_findings=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or update GitHub issue
        if: steps.scan.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/error-report.md', 'utf8');

            // Check if an existing issue exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['error-insight', 'automated'],
              state: 'open'
            });

            const title = '🔍 Weekly Error Pattern Report';
            const body = report + '\n\n---\n*Auto-generated by the Error Insight Scanner workflow*\n*Last scanned: ' + new Date().toISOString().split('T')[0] + '*';

            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['error-insight', 'automated']
              });
            }
