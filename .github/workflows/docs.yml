name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'server/src/**'
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate JSDoc documentation
        working-directory: server
        run: |
          npx jsdoc -c jsdoc.json || echo "JSDoc config not found, skipping"

      - name: Generate API documentation
        working-directory: server
        run: |
          # Create API docs from routes
          echo "# API Documentation" > ../docs/api.md
          echo "" >> ../docs/api.md
          echo "Generated on: $(date -u)" >> ../docs/api.md
          echo "" >> ../docs/api.md
          echo "## Endpoints" >> ../docs/api.md
          echo "" >> ../docs/api.md
          grep -r "router\.\(get\|post\|put\|delete\|patch\)" src/routes/ | \
            sed 's/.*router\.\([a-z]*\).*'\''\([^'\'']*\)'\''.*/| \U\1\E | \2 |/' >> ../docs/api.md || true

      - name: Check for documentation changes
        id: check-changes
        run: |
          git diff --quiet docs/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit documentation updates
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: auto-update documentation [skip ci]" || exit 0
          git push
