name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'server/src/**'
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate JSDoc documentation
        working-directory: server
        run: |
          npx jsdoc -c jsdoc.json || echo "JSDoc config not found, skipping"

      - name: Generate API documentation
        working-directory: server
        run: |
          # Create API docs from routes
          echo "# API Documentation" > ../docs/api.md
          echo "" >> ../docs/api.md
          echo "Generated on: $(date -u)" >> ../docs/api.md
          echo "" >> ../docs/api.md
          echo "## Endpoints" >> ../docs/api.md
          echo "" >> ../docs/api.md
          grep -r "router\.\(get\|post\|put\|delete\|patch\)" src/routes/ | \
            sed 's/.*router\.\([a-z]*\).*'\''\([^'\'']*\)'\''.*/| \U\1\E | \2 |/' >> ../docs/api.md || true

      - name: Check for documentation changes
        id: check-changes
        run: |
          git diff --quiet docs/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit documentation updates
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: auto-update documentation [skip ci]" || exit 0
          git push

  validate-agents-md:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AGENTS.md commands
        run: |
          echo "## Validating AGENTS.md" >> $GITHUB_STEP_SUMMARY
          PASS=true
          
          # Check that referenced paths exist
          while IFS= read -r line; do
            # Extract paths from AGENTS.md lines like "cd server" or references to directories
            path=$(echo "$line" | grep -oP '(?<=cd )\S+' || true)
            if [ -n "$path" ] && [ ! -d "$path" ]; then
              echo "- ❌ Referenced directory not found: \`$path\`" >> $GITHUB_STEP_SUMMARY
              PASS=false
            fi
          done < AGENTS.md
          
          # Check key referenced paths exist
          for dir in mac-app server chrome-extension; do
            if [ -d "$dir" ]; then
              echo "- ✅ Directory exists: \`$dir\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ Referenced directory missing: \`$dir\`" >> $GITHUB_STEP_SUMMARY
              PASS=false
            fi
          done
          
          # Check key referenced files exist
          for file in server/package.json mac-app/.swiftlint.yml mac-app/.swiftformat; do
            if [ -f "$file" ]; then
              echo "- ✅ File exists: \`$file\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ Referenced file missing: \`$file\`" >> $GITHUB_STEP_SUMMARY
              PASS=false
            fi
          done
          
          if [ "$PASS" = true ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All AGENTS.md references validated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Some AGENTS.md references are invalid" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Validate documented commands
        run: |
          echo "## Validating Documented Commands" >> $GITHUB_STEP_SUMMARY
          
          # Test that npm scripts referenced in AGENTS.md exist
          cd server
          for script in dev test format format:check typecheck; do
            if npm run | grep -q "$script"; then
              echo "- ✅ Server script exists: \`npm run $script\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ⚠️ Server script missing: \`npm run $script\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
