name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

env:
  APP_NAME: LexisDic
  BUNDLE_ID: site.waterlee.aidic

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        working-directory: ai-dic-mac
        run: |
          gem install xcpretty

      - name: Build app
        working-directory: ai-dic-mac
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          ./scripts/build-release.sh ${{ github.event.inputs.version || github.ref_name }}

      - name: Notarize app
        working-directory: ai-dic-mac
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ./scripts/notarize.sh

      - name: Create DMG
        working-directory: ai-dic-mac
        run: |
          ./scripts/create-dmg.sh ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: LexisDic-dmg
          path: ai-dic-mac/build/*.dmg

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ai-dic-mac/build
          gh release create "${{ github.ref_name }}" *.dmg --title "${{ github.ref_name }}" --generate-notes

  deploy-server:
    runs-on: ubuntu-latest
    needs: build-mac
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: ai-dic-server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --remote-only

  publish-homebrew-cask:
    runs-on: ubuntu-latest
    needs: build-mac
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download DMG
        env:
          TAG_VERSION: ${{ github.ref_name }}
          DMG_NAME: LexisDic-${{ github.ref_name }}.dmg
        run: |
          curl -L -o LexisDic.dmg "https://github.com/seabornlee/ai-dic-repos/releases/download/${TAG_VERSION}/${DMG_NAME}"

      - name: Set env
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SHA256=$(shasum -a 256 LexisDic.dmg | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Checkout homebrew-cask
        uses: actions/checkout@v4
        with:
          repository: seabornlee/homebrew-cask
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-cask

      - name: Create branch
        working-directory: homebrew-cask
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b lexis-dic-${{ env.VERSION }}

      - name: Create Cask
        env:
          SHA256: ${{ env.SHA256 }}
          VERSION: ${{ env.VERSION }}
        run: |
          cat > homebrew-cask/Casks/lexis-dic.rb << 'RUBY'
          class LexisDic < Cask
            version "{{ version }}"
            sha256 "{{ sha256 }}"

            url "https://github.com/seabornlee/ai-dic-repos/releases/download/v#{version}/LexisDic-#{version}.dmg"
            name "LexisDic"
            desc "AI-powered English Dictionary for macOS"
            homepage "https://github.com/seabornlee/ai-dic-repos"

            app "LexisDic.app"
          end
          RUBY
          sed -i "s/{{ version }}/${{ env.VERSION }}/g" homebrew-cask/Casks/lexis-dic.rb
          sed -i "s/{{ sha256 }}/${{ env.SHA256 }}/g" homebrew-cask/Casks/lexis-dic.rb

      - name: Submit PR
        working-directory: homebrew-cask
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git add Casks/lexis-dic.rb
          git commit -m "lexis-dic ${{ env.VERSION }}"
          git push -u origin lexis-dic-${{ env.VERSION }}
          gh pr create --repo Homebrew/homebrew-cask \
            --title "lexis-dic ${{ env.VERSION }}" \
            --body "Created by GitHub Actions" \
            --head seabornlee:lexis-dic-${{ env.VERSION }}
