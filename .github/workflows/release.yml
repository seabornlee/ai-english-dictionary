name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

env:
  APP_NAME: AIDictionary
  BUNDLE_ID: com.seabornlee.AIDictionary

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        working-directory: ai-dic-mac
        run: |
          gem install xcpretty

      - name: Build app
        working-directory: ai-dic-mac
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          ./scripts/build-release.sh ${{ github.event.inputs.version || github.ref_name }}

      - name: Notarize app
        working-directory: ai-dic-mac
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ./scripts/notarize.sh

      - name: Create DMG
        working-directory: ai-dic-mac
        run: |
          ./scripts/create-dmg.sh ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AIDictionary-dmg
          path: ai-dic-mac/build/*.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ai-dic-mac/build/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-server:
    runs-on: ubuntu-latest
    needs: build-mac
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: ai-dic-server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --remote-only

  publish-homebrew:
    runs-on: ubuntu-latest
    needs: build-mac
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: seabornlee/lexis-dic
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-lexis-dic

      - name: Download DMG for SHA
        env:
          TAG_VERSION: ${{ github.ref_name }}
          DMG_NAME: AIDictionary-${{ github.ref_name }}.dmg
        run: |
          curl -L -o lexis-dic.dmg "https://github.com/seabornlee/ai-dic-repos/releases/download/${TAG_VERSION}/${DMG_NAME}"
          sha256=$(shasum -a 256 lexis-dic.dmg | cut -d' ' -f1)
          echo "sha256=$sha256" >> $GITHUB_ENV
          echo "dmg_name=$DMG_NAME" >> $GITHUB_ENV

      - name: Update formula
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VERSION=$(echo "$TAG_VERSION" | sed 's/^v//')
          cd homebrew-lexis-dic
          sed -i '' "s|url \".*\"|url \"https://github.com/seabornlee/ai-dic-repos/releases/download/v${VERSION}/${dmg_name}\"|" Formula/lexis-dic.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${sha256}\"|" Formula/lexis-dic.rb
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" Formula/lexis-dic.rb

      - name: Push to tap
        working-directory: homebrew-lexis-dic
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Update to ${{ github.ref_name }}"
          git push origin main
