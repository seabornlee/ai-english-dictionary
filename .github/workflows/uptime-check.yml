name: Uptime Check

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check server health
        id: health
        run: |
          STATUS_CODE=$(curl -s -o /tmp/health-response.json -w "%{http_code}" https://ai-dic-server.fly.dev/health || echo "000")
          RESPONSE=$(cat /tmp/health-response.json 2>/dev/null || echo "{}")
          echo "status_code=$STATUS_CODE" >> $GITHUB_OUTPUT
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

          if [ "$STATUS_CODE" = "200" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing alert issue
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['uptime-alert', 'automated'],
              state: 'open'
            });
            return issues.data.length > 0 ? issues.data[0].number : 0;

      - name: Create or update alert issue
        uses: actions/github-script@v7
        with:
          script: |
            const healthy = '${{ steps.health.outputs.healthy }}' === 'true';
            const statusCode = '${{ steps.health.outputs.status_code }}';
            const existingIssueNumber = ${{ steps.existing.outputs.result }};

            if (!healthy && existingIssueNumber === 0) {
              // Create new alert issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Server Down - Health Check Failed',
                body: `## Uptime Alert\n\nThe server health check failed.\n\n**Status Code:** ${statusCode}\n**Endpoint:** https://ai-dic-server.fly.dev/health\n**Time:** ${new Date().toISOString()}\n\n### Response\n\`\`\`json\n${{ steps.health.outputs.response }}\n\`\`\`\n\n---\n*Auto-generated by the Uptime Check workflow*`,
                labels: ['uptime-alert', 'automated']
              });
            } else if (!healthy && existingIssueNumber > 0) {
              // Update existing alert with new failure
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssueNumber,
                body: `**Still down** — Status: ${statusCode} at ${new Date().toISOString()}`
              });
            } else if (healthy && existingIssueNumber > 0) {
              // Close the alert issue - server is back up
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssueNumber,
                body: `✅ **Server is back up** — Status: ${statusCode} at ${new Date().toISOString()}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssueNumber,
                state: 'closed'
              });
            }
