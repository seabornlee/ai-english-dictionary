name: LexisDic
options:
  bundleIdPrefix: site.waterlee.aidic
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "14.0"
targets:
  LexisDic:
    type: application
    platform: macOS
    sources:
      - path: AIDictionary
        excludes:
          - "**/*.md"
          - "**/Preview Content/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: site.waterlee.aidic
        INFOPLIST_FILE: AIDictionary/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: AIDictionary/AIDictionary.entitlements
        CODE_SIGN_IDENTITY: "Mac Developer"
        DEVELOPMENT_TEAM: "UUP2U5JJ9Q"
        PRODUCT_NAME: LexisDic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        SDKROOT: macosx
        SWIFT_VERSION: "5.0"
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        CLANG_ENABLE_MODULES: YES
        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_ENABLE_OBJC_WEAK: YES
        CLANG_WARN_BOOL_CONVERSION: YES
        CLANG_WARN_CONSTANT_CONVERSION: YES
        CLANG_WARN_DOCUMENTATION_COMMENTS: YES
        CLANG_WARN_EMPTY_BODY: YES
        CLANG_WARN_ENUM_CONVERSION: YES
        CLANG_WARN_INT_CONVERSION: YES
        CLANG_WARN_UNREACHABLE_CODE: YES
        GCC_WARN_64_TO_32_BIT_CONVERSION: YES
        GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
        GCC_WARN_UNDECLARED_SELECTOR: YES
        GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
        GCC_WARN_UNUSED_FUNCTION: YES
        GCC_WARN_UNUSED_VARIABLE: YES
    info:
      path: AIDictionary/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.reference
        CFBundleVersion: "2"
        NSServices:
          - NSMenuItem:
              default: "Look up in LexisDic"
            NSMessage: defineWord
            NSPortName: "Lexis Dic"
            NSSendTypes:
              - NSStringPboardType
            NSRequiredContext:
              NSWordLimit: 5
            NSRestricted: false
            NSServiceDescription: "Look up the selected English word using AI-powered definitions"
    entitlements:
      path: AIDictionary/AIDictionary.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.application-groups:
          - "$(TeamIdentifierPrefix)group.site.waterlee.aidic"
    dependencies:
      - target: AIDictionaryShareExtension
    scheme:
      testTargets:
        - AIDictionaryTests

  AIDictionaryShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ShareExtension
        excludes:
          - "**/*.md"
      # Share extension-safe source files from main app for
      # identical definition rendering (VAL-LOOKUP-018) and
      # shared data access (VAL-LOOKUP-019, VAL-LOOKUP-024)
      - path: AIDictionary/APIService.swift
      - path: AIDictionary/Models/Word.swift
      - path: AIDictionary/TextValidation.swift
      - path: AIDictionary/SharedLookupStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: site.waterlee.aidic.ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        CODE_SIGN_IDENTITY: "Mac Developer"
        DEVELOPMENT_TEAM: "UUP2U5JJ9Q"
        PRODUCT_NAME: "$(TARGET_NAME)"
        SDKROOT: macosx
        SWIFT_VERSION: "5.0"
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        CLANG_ENABLE_MODULES: YES
        CLANG_ENABLE_OBJC_ARC: YES
        # App Extension must only use extension-safe APIs
        APPLICATION_EXTENSION_API_ONLY: YES
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: LexisDic
        CFBundleVersion: "2"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: 1
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareExtensionViewController"
          NSExtensionPointIdentifier: com.apple.share-services
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - "$(TeamIdentifierPrefix)group.site.waterlee.aidic"

  AIDictionaryTests:
    type: bundle.unit-test
    platform: macOS
    sources: 
      - path: AIDictionaryTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: site.waterlee.aidic.AIDictionaryTests
        INFOPLIST_FILE: AIDictionaryTests/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LexisDic.app/Contents/MacOS/LexisDic"
    info:
      path: AIDictionaryTests/Info.plist
    dependencies:
      - target: LexisDic 