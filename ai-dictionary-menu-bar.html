<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Dictionary - Menu Bar</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#111125",
                        surface: {
                            DEFAULT: "#111125",
                            dim: "#0c0c1f",
                            bright: "#37374d",
                            container: {
                                lowest: "#0c0c1f",
                                low: "#1a1a2e",
                                DEFAULT: "#1e1e32",
                                high: "#28283d",
                                highest: "#333348"
                            }
                        },
                        primary: {
                            DEFAULT: "#a8e8ff",
                            container: "#00d4ff",
                            fixed: "#b4ebff",
                            "fixed-dim": "#3cd7ff"
                        },
                        secondary: {
                            DEFAULT: "#9bcee1",
                            container: "#174f5f",
                            fixed: "#b7ebfd",
                            "fixed-dim": "#9bcee1"
                        },
                        tertiary: {
                            DEFAULT: "#ffd9a1",
                            container: "#feb528"
                        },
                        "on-surface": "#e2e0fc",
                        "on-surface-variant": "#bbc9cf",
                        outline: "#859398"
                    },
                    fontFamily: {
                        sans: ["Inter", "system-ui", "sans-serif"]
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Inter", system-ui, sans-serif;
            background: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .glass-panel {
            background: rgba(17, 17, 37, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        
        .glass-header {
            background: rgba(17, 17, 37, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .glow-cyan {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }
        
        .text-glow {
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
        }
        
        .scrollbar-thin::-webkit-scrollbar {
            width: 4px;
        }
        
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.15);
            border-radius: 10px;
        }
        
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }
        
        .material-symbols-filled {
            font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24;
        }
        
        .btn-active:active {
            transform: scale(0.96);
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .animate-pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex justify-center items-start pt-4 h-screen">
    <div class="w-[320px] h-[580px] glass-panel rounded-2xl shadow-2xl overflow-hidden flex flex-col ring-1 ring-white/10">
        
        <header class="glass-header flex items-center justify-between px-4 py-3 border-b border-white/5">
            <div class="flex items-center gap-2">
                <span class="text-xl font-black text-slate-100 tracking-tight uppercase">AI Dictionary</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-1.5 px-2 py-1 bg-slate-100/10 rounded-lg">
                    <span class="material-symbols-outlined text-sm text-cyan-400">wifi_off</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Offline</span>
                </div>
                <button class="p-2 rounded-lg hover:bg-cyan-500/10 hover:text-cyan-300 transition-colors text-slate-400 btn-active">
                    <span class="material-symbols-outlined text-xl">content_paste</span>
                </button>
            </div>
        </header>
        
        <div class="px-4 py-3">
            <div class="relative">
                <input 
                    type="text" 
                    value="Luminous"
                    class="w-full bg-surface-container-high/50 rounded-xl py-2.5 pl-10 pr-4 text-sm text-on-surface placeholder-on-surface-variant border-none focus:ring-2 focus:ring-primary-container/40 transition-all glass-panel shadow-lg outline-none"
                    placeholder="Search..."
                />
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-on-surface-variant">search</span>
            </div>
        </div>
        
        <nav class="px-4 pb-2 flex gap-4">
            <button class="text-cyan-400 font-bold text-xs uppercase tracking-widest">Define</button>
            <button class="text-slate-500 hover:text-slate-300 text-xs uppercase tracking-widest transition-colors">Favorites</button>
            <button class="text-slate-500 hover:text-slate-300 text-xs uppercase tracking-widest transition-colors">History</button>
        </nav>
        
        <main class="flex-1 overflow-y-auto scrollbar-thin px-4 py-2 space-y-3">
            
            <article class="bg-surface-container-low rounded-xl p-5 space-y-4 shadow-lg border-l-2 border-cyan-400/30">
                <header class="flex justify-between items-start">
                    <div>
                        <h1 class="text-4xl font-black tracking-tight text-on-surface leading-none">Luminous</h1>
                        <p class="text-[10px] font-mono uppercase tracking-widest text-cyan-400/80 mt-1">/ˈluːmɪnəs/ • adj.</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="w-8 h-8 rounded-xl bg-surface-container-high flex items-center justify-center hover:bg-cyan-500/20 text-cyan-400 transition-all btn-active">
                            <span class="material-symbols-filled text-lg">star</span>
                        </button>
                        <button class="w-8 h-8 rounded-xl bg-cyan-400 flex items-center justify-center hover:brightness-110 text-slate-900 transition-all btn-active glow-cyan">
                            <span class="material-symbols-outlined text-lg">add</span>
                        </button>
                    </div>
                </header>
                
                <div class="space-y-3">
                    <p class="text-base font-light leading-relaxed text-on-surface/90">
                        Radiating or reflecting light; shining; bright. Very brilliant; intellectual.
                    </p>
                    <div class="flex flex-wrap gap-2">
                        <span class="px-3 py-1 bg-surface-container rounded-full text-[10px] font-bold uppercase tracking-wider text-on-surface-variant border border-white/5">Radiant</span>
                        <span class="px-3 py-1 bg-surface-container rounded-full text-[10px] font-bold uppercase tracking-wider text-on-surface-variant border border-white/5">Lucid</span>
                        <span class="px-3 py-1 bg-surface-container rounded-full text-[10px] font-bold uppercase tracking-wider text-on-surface-variant border border-white/5">Vivid</span>
                    </div>
                </div>
            </article>
            
            <section class="bg-surface-container-low rounded-xl p-4 flex items-center justify-between">
                <div class="space-y-1">
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Frequency Score</span>
                    <div class="h-1 w-32 bg-surface-container-highest rounded-full overflow-hidden">
                        <div class="h-full bg-cyan-400 w-3/4 shadow-[0_0_8px_rgba(0,212,255,0.6)]"></div>
                    </div>
                </div>
                <span class="text-xs font-bold text-on-surface">Top 12%</span>
            </section>
            
            <figure class="bg-gradient-to-br from-surface-container-low to-surface-container-high rounded-xl p-4 relative overflow-hidden group">
                <div class="relative z-10">
                    <span class="material-symbols-outlined text-cyan-400 mb-2">lightbulb</span>
                    <blockquote class="text-xs italic text-on-surface-variant leading-snug">
                        "The luminous dial of his watch glowed in the dark cabin."
                    </blockquote>
                </div>
                <div class="absolute -right-4 -bottom-4 opacity-10 transition-transform group-hover:scale-110 duration-500">
                    <span class="material-symbols-outlined text-7xl text-cyan-400">menu_book</span>
                </div>
            </figure>
            
        </main>
        
        <footer class="glass-header border-t border-white/5 px-4 py-4 space-y-3">
            <button class="w-full flex items-center justify-between px-4 py-3 bg-white/5 hover:bg-white/10 rounded-xl transition-all group btn-active">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-cyan-400">open_in_new</span>
                    <span class="text-xs font-bold uppercase tracking-widest text-slate-300 group-hover:text-cyan-400 transition-colors">Open Full Dictionary</span>
                </div>
                <span class="material-symbols-outlined text-slate-500 text-sm">chevron_right</span>
            </button>
            
            <div class="flex items-center justify-between px-2">
                <button class="flex items-center gap-2 text-slate-500 hover:text-red-400 transition-colors">
                    <span class="material-symbols-outlined text-lg">power_settings_new</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Quit</span>
                </button>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse-glow"></span>
                    <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest">AI Active</span>
                </div>
            </div>
        </footer>
        
    </div>
</body>
</html>
