<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scholar AI Dictionary - Menu Bar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent;
        }
        .glass-blur {
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        /* Custom scrollbar for small panel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "outline": "#859398",
                "primary-fixed-dim": "#3cd7ff",
                "surface-container-high": "#28283d",
                "secondary-fixed-dim": "#9bcee1",
                "on-surface-variant": "#bbc9cf",
                "on-secondary-fixed": "#001f27",
                "surface-container-highest": "#333348",
                "on-surface": "#e2e0fc",
                "surface-container": "#1e1e32",
                "secondary-fixed": "#b7ebfd",
                "surface": "#111125",
                "on-secondary-fixed-variant": "#144d5c",
                "secondary-container": "#174f5f",
                "tertiary-fixed": "#ffdeae",
                "on-tertiary-fixed": "#281900",
                "surface-container-low": "#1a1a2e",
                "tertiary-fixed-dim": "#ffba3d",
                "on-primary": "#003642",
                "primary-container": "#00d4ff",
                "on-error-container": "#ffdad6",
                "primary-fixed": "#b4ebff",
                "on-tertiary-fixed-variant": "#604100",
                "primary": "#a8e8ff",
                "on-tertiary-container": "#6c4900",
                "error-container": "#93000a",
                "secondary": "#9bcee1",
                "inverse-primary": "#00677e",
                "on-background": "#e2e0fc",
                "surface-container-lowest": "#0c0c1f",
                "inverse-surface": "#e2e0fc",
                "on-primary-fixed": "#001f27",
                "surface-bright": "#37374d",
                "surface-tint": "#3cd7ff",
                "surface-dim": "#111125",
                "tertiary": "#ffd9a1",
                "on-secondary-container": "#8dc0d2",
                "on-secondary": "#003642",
                "on-primary-container": "#00586b",
                "error": "#ffb4ab",
                "on-primary-fixed-variant": "#004e5f",
                "on-tertiary": "#432c00",
                "tertiary-container": "#feb528",
                "surface-variant": "#333348",
                "inverse-on-surface": "#2f2e43",
                "on-error": "#690005",
                "background": "#111125",
                "outline-variant": "#3c494e"
              },
              fontFamily: {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
</head>
<body class="bg-transparent antialiased flex justify-center items-start pt-4 h-screen">
<!-- macOS Menu Bar Panel (320px wide) -->
<div class="w-[320px] h-[580px] bg-[#111125]/60 backdrop-blur-xl rounded-2xl shadow-2xl overflow-hidden flex flex-col ring-1 ring-white/10">
<!-- TopAppBar (Integrated Search) -->
<header class="bg-[#111125]/60 backdrop-blur-xl flex items-center justify-between px-4 py-3 w-full docked full-width top-0 shadow-2xl">
<div class="flex flex-col">
<span class="text-xl font-black text-slate-100 tracking-tighter uppercase font-['Inter']">Scholar</span>
</div>
<div class="flex gap-2">
<div class="flex items-center gap-1.5 px-2 py-1 bg-slate-100/10 rounded-lg">
<span class="material-symbols-outlined text-sm text-cyan-400" data-icon="wifi_off">wifi_off</span>
<span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Offline</span>
</div>
<button class="p-2 rounded-lg hover:bg-cyan-500/10 hover:text-cyan-300 transition-colors text-slate-400 active:scale-95 duration-200">
<span class="material-symbols-outlined text-xl" data-icon="content_paste">content_paste</span>
</button>
</div>
</header>
<!-- Search Bar Area -->
<div class="px-4 py-2">
<div class="relative group">
<input class="w-full bg-surface-container-high/50 border-none rounded-xl py-2.5 pl-10 pr-4 text-sm text-on-surface placeholder-on-surface-variant focus:ring-2 focus:ring-primary-container/50 transition-all glass-blur shadow-2xl" placeholder="Search lexicon..." type="text" value="Luminous"/>
<span class="material-symbols-outlined absolute left-3 top-2.5 text-on-surface-variant group-focus:text-cyan-400 transition-colors" data-icon="search">search</span>
</div>
</div>
<!-- Main Navigation (Horizontal adaptation for compact view) -->
<nav class="px-4 py-1 flex justify-between">
<div class="flex gap-4">
<button class="text-cyan-400 font-bold font-['Inter'] text-xs uppercase tracking-widest active:translate-x-1 duration-150">Define</button>
<button class="text-slate-500 hover:text-slate-300 font-['Inter'] text-xs uppercase tracking-widest transition-all">Favorites</button>
<button class="text-slate-500 hover:text-slate-300 font-['Inter'] text-xs uppercase tracking-widest transition-all">History</button>
</div>
</nav>
<!-- Main Content Canvas (Bento Style) -->
<main class="flex-1 overflow-y-auto px-4 py-3 space-y-4">
<!-- Quick Definition Card -->
<div class="bg-surface-container-low rounded-xl p-5 space-y-4 shadow-lg border-l-2 border-cyan-400/30">
<div class="flex justify-between items-start">
<div>
<h1 class="text-4xl font-black tracking-tighter text-on-surface font-headline leading-none">Luminous</h1>
<p class="text-[10px] font-mono uppercase tracking-widest text-cyan-400/80 mt-1">/ˈluːmɪnəs/ • adj.</p>
</div>
<div class="flex gap-2">
<button class="w-8 h-8 rounded-xl bg-surface-container-high flex items-center justify-center hover:bg-cyan-500/20 text-cyan-400 transition-all active:scale-90">
<span class="material-symbols-outlined text-lg" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="w-8 h-8 rounded-xl bg-primary-container flex items-center justify-center hover:brightness-110 text-on-primary-container transition-all active:scale-90 shadow-[0_0_15px_rgba(0,212,255,0.4)]">
<span class="material-symbols-outlined text-lg" data-icon="add">add</span>
</button>
</div>
</div>
<div class="space-y-3">
<p class="text-lg font-light leading-relaxed text-on-surface/90 font-['Inter']">
                        Radiating or reflecting light; shining; bright. Very brilliant; intellectual.
                    </p>
<div class="flex flex-wrap gap-2 pt-2">
<span class="px-3 py-1 bg-surface-container rounded-full text-[10px] font-bold uppercase tracking-widest text-on-surface-variant border border-white/5">Radiant</span>
<span class="px-3 py-1 bg-surface-container rounded-full text-[10px] font-bold uppercase tracking-widest text-on-surface-variant border border-white/5">Lucid</span>
<span class="px-3 py-1 bg-surface-container rounded-full text-[10px] font-bold uppercase tracking-widest text-on-surface-variant border border-white/5">Vivid</span>
</div>
</div>
</div>
<!-- Usage Metric / AI Insight -->
<div class="bg-surface-container-low rounded-xl p-4 flex items-center justify-between">
<div class="space-y-1">
<span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Frequency Score</span>
<div class="h-0.5 w-32 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-cyan-400 w-3/4 shadow-[0_0_8px_rgba(0,212,255,0.8)]"></div>
</div>
</div>
<div class="text-right">
<span class="text-xs font-bold text-on-surface">Top 12%</span>
</div>
</div>
<!-- Context Hint Card -->
<div class="bg-gradient-to-br from-surface-container-low to-surface-container-high rounded-xl p-4 relative overflow-hidden group">
<div class="relative z-10">
<span class="material-symbols-outlined text-cyan-400 mb-2" data-icon="lightbulb">lightbulb</span>
<p class="text-xs italic text-on-surface-variant leading-snug">"The luminous dial of his watch glowed in the dark cabin."</p>
</div>
<div class="absolute -right-4 -bottom-4 opacity-10 transition-transform group-hover:scale-110 duration-500">
<span class="material-symbols-outlined text-7xl text-cyan-400" data-icon="menu_book">menu_book</span>
</div>
</div>
</main>
<!-- Footer Navigation / SideNavBar adapted as Footer -->
<footer class="bg-[#111125]/80 backdrop-blur-xl border-t border-white/5 px-4 py-4 space-y-3">
<button class="w-full flex items-center justify-between px-4 py-3 bg-white/5 hover:bg-white/10 rounded-xl transition-all group active:translate-x-1 duration-150">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-cyan-400" data-icon="open_in_new">open_in_new</span>
<span class="font-['Inter'] text-xs font-bold uppercase tracking-widest text-slate-300 group-hover:text-cyan-400 transition-colors">Open Full Dictionary</span>
</div>
<span class="material-symbols-outlined text-slate-500 text-sm" data-icon="chevron_right">chevron_right</span>
</button>
<div class="flex items-center justify-between px-2">
<button class="flex items-center gap-2 text-slate-500 hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="power_settings_new">power_settings_new</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Quit</span>
</button>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
<span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest">AI Engine Active</span>
</div>
</div>
</footer>
</div>
</body></html>
