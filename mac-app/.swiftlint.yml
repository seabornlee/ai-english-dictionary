# SwiftLint Configuration for LexisDic (AI Dictionary macOS App)
# https://github.com/realm/SwiftLint

# Paths to include (relative to this config file)
included:
  - AIDictionary
  - AIDictionaryTests

# Paths to exclude
excluded:
  - .build
  - build
  - DerivedData
  - Package.swift
  - "**/*.generated.swift"

# Rules to disable (some conflict with SwiftUI patterns)
disabled_rules:
  - multiple_closures_with_trailing_closure  # SwiftUI uses this pattern extensively
  - opening_brace  # Can conflict with SwiftUI view builders

# Rules to opt-in
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - nimble_operator
  - nslocalizedstring_key
  - number_separator
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Analyzer rules
analyzer_rules:
  - unused_declaration
  - unused_import

# Rule configurations
line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_function_declarations: false
  ignores_comments: true
  ignores_interpolated_strings: true

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 6
  error: 8
  ignores_default_parameters: true

cyclomatic_complexity:
  warning: 15
  error: 25
  ignores_case_statements: true

nesting:
  type_level:
    warning: 3
    error: 5
  function_level:
    warning: 3
    error: 5

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k
    - a
    - b
    - r
    - g

type_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 50
    error: 60

large_tuple:
  warning: 3
  error: 4

trailing_comma:
  mandatory_comma: false

vertical_whitespace:
  max_empty_lines: 2

# Custom rules
custom_rules:
  no_print_in_production:
    name: "No print() in production code"
    regex: "\\bprint\\s*\\("
    message: "Use os.log or structured logging instead of print()"
    severity: warning
    match_kinds:
      - identifier
