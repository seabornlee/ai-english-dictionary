name: LexisDic
options:
  bundleIdPrefix: site.waterlee.aidic
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  xcodeVersion: "14.0"
targets:
  LexisDic:
    type: application
    platform: macOS
    sources:
      - path: AIDictionary
        excludes:
          - "**/*.md"
          - "**/Preview Content/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: site.waterlee.aidic
        INFOPLIST_FILE: AIDictionary/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_ENTITLEMENTS: AIDictionary/AIDictionary.entitlements
        CODE_SIGN_IDENTITY: "Mac Developer"
        DEVELOPMENT_TEAM: "UUP2U5JJ9Q"
        PRODUCT_NAME: LexisDic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        SDKROOT: macosx
        SWIFT_VERSION: "5.0"
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        CLANG_ENABLE_MODULES: YES
        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_ENABLE_OBJC_WEAK: YES
        CLANG_WARN_BOOL_CONVERSION: YES
        CLANG_WARN_CONSTANT_CONVERSION: YES
        CLANG_WARN_DOCUMENTATION_COMMENTS: YES
        CLANG_WARN_EMPTY_BODY: YES
        CLANG_WARN_ENUM_CONVERSION: YES
        CLANG_WARN_INT_CONVERSION: YES
        CLANG_WARN_UNREACHABLE_CODE: YES
        GCC_WARN_64_TO_32_BIT_CONVERSION: YES
        GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
        GCC_WARN_UNDECLARED_SELECTOR: YES
        GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
        GCC_WARN_UNUSED_FUNCTION: YES
        GCC_WARN_UNUSED_VARIABLE: YES
    info:
      path: AIDictionary/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.reference
        CFBundleVersion: "2"
    entitlements:
      path: AIDictionary/AIDictionary.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.application-groups:
          - "$(TeamIdentifierPrefix)group.site.waterlee.aidic"
    dependencies: []
    preBuildScripts:
      - script: |
          if which swiftformat > /dev/null; then
            swiftformat "${SRCROOT}/AIDictionary" --config "${SRCROOT}/.swiftformat" --lint
          else
            echo "warning: SwiftFormat not installed. Run 'brew install swiftformat' to enable formatting."
          fi
        name: SwiftFormat
        basedOnDependencyAnalysis: false
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml" --reporter xcode
          else
            echo "warning: SwiftLint not installed. Run 'brew install swiftlint' to enable linting."
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - AIDictionaryTests

  AIDictionaryTests:
    type: bundle.unit-test
    platform: macOS
    sources: 
      - path: AIDictionaryTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: site.waterlee.aidic.AIDictionaryTests
        INFOPLIST_FILE: AIDictionaryTests/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LexisDic.app/Contents/MacOS/LexisDic"
    info:
      path: AIDictionaryTests/Info.plist
    dependencies:
      - target: LexisDic 