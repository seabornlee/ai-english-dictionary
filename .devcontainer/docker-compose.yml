version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-20
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    network_mode: service:mongodb

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=ai-dictionary

volumes:
  mongodb-data:
