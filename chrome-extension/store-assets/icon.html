<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=128, height=128">
  <title>Store Icon 128x128</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 128px;
      height: 128px;
      /* Transparent padding: 16px per side, actual icon: 96x96 */
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .icon {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      color: #fff;
      font-weight: 700;
      /* Subtle white outer glow for dark backgrounds */
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 4px 12px rgba(25, 118, 210, 0.3);
    }
  </style>
</head>
<body>
  <div class="icon">L</div>
</body>
</html>
