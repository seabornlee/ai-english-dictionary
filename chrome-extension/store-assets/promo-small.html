<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=440, height=280">
  <title>Small Promo 440x280</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 440px;
      height: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      color: #fff;
    }
    .container {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(25, 118, 210, 0.4);
    }
    .text h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .text p {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">L</div>
    <div class="text">
      <h1>Lexis</h1>
      <p>AI Chinese Dictionary<br>Select text, get definitions</p>
      <div class="badge">5 Interface Languages</div>
    </div>
  </div>
</body>
</html>
